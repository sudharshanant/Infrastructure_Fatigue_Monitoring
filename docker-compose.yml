version: '3.8'

services:
  inframonitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inframonitor-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - WORKERS=4
      - DATA_PATH=data/vibration_data.csv
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - inframonitor-net
    labels:
      - "com.example.description=Infrastructure Fatigue Monitoring Dashboard"
      - "com.example.version=1.0"

  # Optional: Nginx reverse proxy (uncomment to enable)
  # nginx:
  #   image: nginx:latest
  #   container_name: inframonitor-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - inframonitor
  #   networks:
  #     - inframonitor-net
  #   restart: unless-stopped

networks:
  inframonitor-net:
    driver: bridge
